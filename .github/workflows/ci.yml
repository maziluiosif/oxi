name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  # The release workflow dispatches CI explicitly for its bot-created master -> dev PR.
  workflow_dispatch:
    inputs:
      ref:
        description: Commit/ref to validate instead of the selected workflow ref
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - uses: Swatinem/rust-cache@v2

      - name: Validate GitHub Actions workflows
        uses: raven-actions/actionlint@v2

      - name: Test release changelog generator
        run: python .github/scripts/test_release_changelog.py

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo audit
        # Ignore policy (with rationale per advisory) lives in .cargo/audit.toml.
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: cargo test
        run: cargo test

  windows-check:
    name: windows-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-check

      # Keep platform-specific APIs honest before a merge can reach the release pipeline.
      - name: cargo check --all-targets
        run: cargo check --all-targets
