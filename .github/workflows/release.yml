name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Skip the run triggered by our own release-bump commit, to avoid a loop.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    outputs:
      released: ${{ steps.gen.outputs.released }}
      version: ${{ steps.gen.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate changelog and bump version
        id: gen
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: anthropic/claude-haiku-4.5
        run: python .github/scripts/release_changelog.py

      - name: Commit, tag and push
        if: steps.gen.outputs.released == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md Cargo.toml Cargo.lock
          git commit -m "chore(release): v${{ steps.gen.outputs.version }}"
          git tag "v${{ steps.gen.outputs.version }}"
          git push origin HEAD:master
          git push origin "v${{ steps.gen.outputs.version }}"

      - name: Upload release notes
        if: steps.gen.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  sync-dev:
    needs: changelog
    if: needs.changelog.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Open (or reuse) a sync PR master -> dev and auto-merge it
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="v${{ needs.changelog.outputs.version }}"
          pr=$(gh pr list --base dev --head master --state open --json number -q '.[0].number')
          if [ -z "$pr" ]; then
            gh pr create --base dev --head master \
              --title "chore: sync release $ver back to dev" \
              --body "Brings the \`$ver\` changelog entry and version bump from master into dev."
            pr=$(gh pr list --base dev --head master --state open --json number -q '.[0].number')
          fi
          # Merge once CI on the PR is green (auto-merge); harmless if it can merge now.
          gh pr merge "$pr" --auto --merge || echo "Could not enable auto-merge; merge the sync PR manually."

  build:
    needs: changelog
    if: needs.changelog.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: oxi-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: oxi-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: oxi-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.changelog.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        env:
          OXI_VERSION: ${{ needs.changelog.outputs.version }}
        run: |
          bin="target/${{ matrix.target }}/release/oxi"
          # Wrap the binary in a proper .app bundle so Finder launches the GUI
          # directly (no Terminal window, correct icon).
          bash scripts/bundle-macos.sh "$bin" dist
          tar -czf "${{ matrix.name }}.tar.gz" -C dist oxi.app
          ls -la "${{ matrix.name }}.tar.gz"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          bin="target/${{ matrix.target }}/release/oxi"
          tar -czf "${{ matrix.name }}.tar.gz" -C "$(dirname "$bin")" oxi
          ls -la "${{ matrix.name }}.tar.gz"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/oxi.exe" -DestinationPath "${{ matrix.name }}.zip"

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.changelog.outputs.version }}
          name: v${{ needs.changelog.outputs.version }}
          body_path: release_notes.md
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip
          fail_on_unmatched_files: false

  homebrew:
    needs: [changelog, build]
    if: needs.changelog.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap formula
        env:
          # Private half of a write-enabled deploy key on maziluiosif/homebrew-tap.
          TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
        run: |
          ver="${{ needs.changelog.outputs.version }}"
          base="https://github.com/${{ github.repository }}/releases/download/v${ver}"

          curl -fsSLo macos.tar.gz "$base/oxi-macos-arm64.tar.gz"
          curl -fsSLo linux.tar.gz "$base/oxi-linux-x86_64.tar.gz"
          sha_mac=$(sha256sum macos.tar.gz | cut -d' ' -f1)
          sha_linux=$(sha256sum linux.tar.gz | cut -d' ' -f1)

          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_SSH_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key"

          git clone git@github.com:maziluiosif/homebrew-tap.git tap
          cat > tap/Formula/oxi.rb <<EOF
          # This formula is regenerated automatically by the release workflow in
          # maziluiosif/oxi (.github/workflows/release.yml, "homebrew" job).
          # Manual edits will be overwritten on the next release.
          class Oxi < Formula
            desc "Standalone coding agent chat UI (Rust + egui)"
            homepage "https://github.com/maziluiosif/oxi"
            version "${ver}"
            license "MIT"

            on_macos do
              depends_on arch: :arm64
              url "${base}/oxi-macos-arm64.tar.gz"
              sha256 "${sha_mac}"
            end

            on_linux do
              depends_on arch: :x86_64
              url "${base}/oxi-linux-x86_64.tar.gz"
              sha256 "${sha_linux}"
            end

            def install
              if OS.mac?
                # The tarball holds a single top-level oxi.app; Homebrew strips a sole
                # top-level directory while staging, leaving Contents/ at buildpath.
                appdir = prefix/"oxi.app"
                if (buildpath/"oxi.app").exist?
                  prefix.install "oxi.app"
                else
                  appdir.install buildpath.children
                end
                bin.write_exec_script appdir/"Contents/MacOS/oxi"
              else
                bin.install "oxi"
              end
            end

            def caveats
              return unless OS.mac?

              <<~EOS
                Run \`oxi\` from a project directory to open it as the first workspace.

                To make the app visible in Launchpad / Spotlight, link the bundle:
                  ln -sf "#{opt_prefix}/oxi.app" /Applications/oxi.app
              EOS
            end

            test do
              assert_predicate bin/"oxi", :exist?
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/oxi.rb
          git commit -m "oxi ${ver}" || { echo "Formula unchanged, nothing to push."; exit 0; }
          git push origin HEAD
