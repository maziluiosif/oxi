name: Release

on:
  push:
    branches: [master]
  # Allows retrying the pipeline from the Actions UI without manufacturing a commit.
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    # Skip the run triggered by our own release-bump commit when a custom token is used.
    # Pushes made with GITHUB_TOKEN normally do not trigger another workflow, but this guard
    # keeps the pipeline loop-safe if the authentication strategy changes later.
    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    outputs:
      released: ${{ steps.gen.outputs.released }}
      version: ${{ steps.gen.outputs.version }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # workflow_dispatch may be launched from another ref; releases always come from master.
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Record source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog and bump version
        id: gen
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: anthropic/claude-haiku-4.5
        run: python .github/scripts/release_changelog.py

      - name: Upload generated release metadata
        if: steps.gen.outputs.released == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: |
            CHANGELOG.md
            Cargo.toml
            Cargo.lock
            release_notes.md
          if-no-files-found: error

  build:
    needs: changelog
    if: needs.changelog.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: oxi-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: oxi-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: oxi-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.changelog.outputs.source_sha }}

      - name: Apply generated version metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libgl1-mesa-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        env:
          OXI_VERSION: ${{ needs.changelog.outputs.version }}
        run: |
          bin="target/${{ matrix.target }}/release/oxi"
          # Wrap the binary in a proper .app bundle so Finder launches the GUI
          # directly (no Terminal window, correct icon).
          bash scripts/bundle-macos.sh "$bin" dist
          tar -czf "${{ matrix.name }}.tar.gz" -C dist oxi.app
          ls -la "${{ matrix.name }}.tar.gz"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          bin="target/${{ matrix.target }}/release/oxi"
          tar -czf "${{ matrix.name }}.tar.gz" -C "$(dirname "$bin")" oxi
          ls -la "${{ matrix.name }}.tar.gz"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/oxi.exe" -DestinationPath "${{ matrix.name }}.zip"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.*
          if-no-files-found: error

  publish:
    needs: [changelog, build]
    if: needs.changelog.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.changelog.outputs.source_sha }}

      - name: Download generated release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata

      - name: Commit, tag and push the verified release
        run: |
          version="${{ needs.changelog.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md Cargo.toml Cargo.lock
          git commit -m "chore(release): v${version}"
          git tag -a "v${version}" -m "oxi v${version}"
          # The release commit is published only after every platform built successfully.
          git push --atomic origin HEAD:master "refs/tags/v${version}"

      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          pattern: oxi-*
          path: dist
          merge-multiple: true

      - name: Publish one GitHub release with all platforms
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.changelog.outputs.version }}
          name: v${{ needs.changelog.outputs.version }}
          body_path: release_notes.md
          files: dist/*
          fail_on_unmatched_files: true

  sync-dev:
    needs: [changelog, publish]
    if: needs.changelog.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile master and dev after the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="v${{ needs.changelog.outputs.version }}"
          release_sha=$(gh api "repos/${GH_REPO}/git/ref/heads/master" --jq .object.sha)
          test -n "$release_sha"
          pr=$(gh pr list --base dev --head master --state open --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            gh pr create \
              --base dev \
              --head master \
              --title "chore: sync release ${version} back to dev" \
              --body "Brings the generated ${version} changelog and Cargo version bump back to dev."
            pr=$(gh pr list --base dev --head master --state open --json number --jq '.[0].number')
          fi
          test -n "$pr"

          # PRs created with GITHUB_TOKEN do not trigger pull_request workflows. Dispatch CI
          # explicitly for the release commit so protected dev receives its required check.
          gh workflow run ci.yml --ref master -f ref="${version}"
          gh pr merge "$pr" --auto --merge

          # Wait for required checks and auto-merge, then fast-forward master to the sync
          # merge commit. Both branches consequently end at the exact same SHA, rather
          # than retaining a history-only difference which appears in the next release PR.
          sync_sha=""
          for _ in $(seq 1 120); do
            state=$(gh pr view "$pr" --json state --jq .state)
            if [ "$state" = "MERGED" ]; then
              sync_sha=$(gh pr view "$pr" --json mergeCommit --jq .mergeCommit.oid)
              break
            fi
            if [ "$state" = "CLOSED" ]; then
              echo "Sync PR #${pr} was closed without merging." >&2
              exit 1
            fi
            sleep 15
          done
          test -n "$sync_sha"

          # Never promote work that reached dev while this sync PR was waiting for CI.
          # In the normal release flow the sync merge changes history only, so its tree
          # must be byte-for-byte identical to the verified release tree on master.
          release_tree=$(gh api "repos/${GH_REPO}/git/commits/${release_sha}" --jq .tree.sha)
          sync_tree=$(gh api "repos/${GH_REPO}/git/commits/${sync_sha}" --jq .tree.sha)
          if [ "$release_tree" != "$sync_tree" ]; then
            echo "dev changed while release ${version} was syncing; refusing to move master." >&2
            exit 1
          fi

          # This is a non-forced fast-forward: the sync merge has the release commit
          # on master as a parent. GitHub-token ref updates do not start another workflow.
          gh api --method PATCH "repos/${GH_REPO}/git/refs/heads/master" \
            -f sha="$sync_sha" -F force=false

  homebrew:
    needs: [changelog, publish]
    if: needs.changelog.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap cask
        env:
          # Private half of a write-enabled deploy key on maziluiosif/homebrew-tap.
          TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
        run: |
          ver="${{ needs.changelog.outputs.version }}"
          base="https://github.com/${{ github.repository }}/releases/download/v${ver}"

          curl -fsSLo macos.tar.gz "$base/oxi-macos-arm64.tar.gz"
          curl -fsSLo linux.tar.gz "$base/oxi-linux-x86_64.tar.gz"
          sha_mac=$(sha256sum macos.tar.gz | cut -d' ' -f1)
          sha_linux=$(sha256sum linux.tar.gz | cut -d' ' -f1)

          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_SSH_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key"

          git clone git@github.com:maziluiosif/homebrew-tap.git tap
          mkdir -p tap/Casks
          rm -f tap/Formula/oxi.rb
          cat > tap/Casks/oxi.rb <<EOF
          # This cask is regenerated automatically by the release workflow in
          # maziluiosif/oxi (.github/workflows/release.yml, "homebrew" job).
          # Manual edits will be overwritten on the next release.
          cask "oxi" do
            version "${ver}"

            on_macos do
              sha256 "${sha_mac}"
              url "${base}/oxi-macos-arm64.tar.gz",
                  verified: "github.com/maziluiosif/oxi/"

              depends_on arch: :arm64
              depends_on macos: :catalina

              app "oxi.app"
              binary "#{appdir}/oxi.app/Contents/MacOS/oxi", target: "oxi"

              caveats <<~EOS
                oxi is ad-hoc signed but not Apple-notarized. Install it explicitly without
                quarantine only when you trust its source and published release:

                  HOMEBREW_CASK_OPTS="--no-quarantine" brew install --cask maziluiosif/tap/oxi

                Run \`oxi\` from a project directory to open it as the first workspace.
              EOS
            end

            on_linux do
              sha256 "${sha_linux}"
              url "${base}/oxi-linux-x86_64.tar.gz",
                  verified: "github.com/maziluiosif/oxi/"

              depends_on arch: :x86_64

              binary "oxi"
            end

            name "oxi"
            desc "Native, local-first coding agent"
            homepage "https://maziluiosif.github.io/oxi/"
          end
          EOF

          cat > tap/README.md <<'EOF'
          # homebrew-tap

          Homebrew tap for [oxi](https://github.com/maziluiosif/oxi), a native, local-first coding agent.

          ## Install

          ### macOS (Apple Silicon)

          oxi is ad-hoc signed but not Apple-notarized. Only bypass quarantine when you trust the
          project and its published release:

          ```sh
          brew tap maziluiosif/tap
          HOMEBREW_CASK_OPTS="--no-quarantine" brew install --cask oxi
          ```

          This installs `oxi.app` in `/Applications` and exposes the `oxi` command.

          ### Linux (x86_64)

          ```sh
          brew tap maziluiosif/tap
          brew install --cask oxi
          ```

          For Windows or manual installation, use the [GitHub releases](https://github.com/maziluiosif/oxi/releases).

          The Cask is updated automatically by the release workflow in the main repository.
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "oxi ${ver}" || { echo "Cask unchanged, nothing to push."; exit 0; }
          git push origin HEAD
